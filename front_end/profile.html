<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src=""></script>
</head>

<body>
    <div class="flex min-h-screen">
        <div class="border border-gray-200 w-56 min-h-screen p-2">
            <h2 class="mb-20 px-3 py-3 font-bold text-blue-600 text-2xl">Amin'sBank</h2>

            <a href="/dashboard"
                class="flex items-center gap-2 px-4 mb-4 opacity-60 hover:bg-gray-300 rounded-[10px] p-2.5 transition duration-500">

                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                </svg>
                Dashboard</a>

            <a href="/transaction"
                class="flex items-center gap-2 opacity-60 mb-4 px-4 hover:bg-gray-300 rounded-[10px] p-2.5 transition duration-500">

                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
                Transaction</a>

            <a href="/transfer"
                class="flex items-center gap-2 opacity-60 mb-4 px-4 hover:bg-gray-300 rounded-[10px] p-2.5 transition duration-500">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M7.5 21 3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5" />
                </svg>
                transfer</a>

            <a href="/cards"
                class="flex gap-2 opacity-60 mb-4 px-4 hover:bg-gray-300 rounded-[10px] p-2.5 transition duration-500">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Z" />
                </svg>
                cards</a>

            <a href="/profile"
                class="flex gap-2 opacity-60 mb-4 px-4 hover:bg-gray-300 rounded-[10px] p-2.5 transition duration-500">

                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
                profile</a>


        </div>
        <div class="flex-1 bg-slate-100 p-2">
            <p class="px-3  text-3xl font-semibold mt-9">Profile</p>
            <p class=" px-6 text- opacity-70 mt-3">Manage your account and Your personal information</p>

            <div class="mt-6 rounded-3xl border bg-white p-4">
                <h2 class="font-semibold text-xl">Personal information</h2>

                <div class="mt-8">
                    <div class="flex h-20 w-20 items-center justify-center rounded-full bg-blue-100">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                            stroke="currentColor" class="size-22 text-blue-600">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                        </svg>

                    </div>

                </div>

                <div class="mt-10 grid grid-cols-2 gap-8">
                    <div>
                        <label class="font-semibold ml-1">Full Name</label>
                        <input
                            class="w-full border px-2 py-1/2 mt-2 bg-gray-50 border-gray-100 rounded-md outline-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-200 transition duration-500 placeholder:text-sm"
                            placeholder="Name">
                    </div>
                    <div>
                        <label class="font-semibold ml-1">Email</label>
                        <input
                            class="w-full border px-2 py-1/2 mt-2 bg-gray-50 border-gray-100 rounded-md outline-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-200 transition duration-500 placeholder:text-sm"
                            placeholder="John.Doe@gmail.com">
                    </div>

                    <div>
                        <label class="font-semibold ml-1">Phone Number</label>
                        <input
                            class="w-full border px-2 py-1/2 mt-2 bg-gray-50 border-gray-100 rounded-md outline-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-200 transition duration-500 placeholder:text-sm"
                            placeholder="+ (555) 12345678">

                    </div>

                    <div>
                        <label class="font-semibold ml-1">Address</label>
                        <input
                            class="w-full border px-2 py-1/2 mt-2 bg-gray-50 border-gray-100 rounded-md outline-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-200 transition duration-500 placeholder:text-sm"
                            placeholder="123 Main Street, New York, NY 10001">
                    </div>
                </div>
                <button
                    class="px-2 py-1 ml-3 mt-5 bg-black text-white w-32 rounded-md hover:bg-gray-600 transition duration-500">Edit</button>

            </div>
        </div>
    </div>


</body>
